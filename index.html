<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTF Deck Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>TTF Deck Builder</h1>
    <div id="mode-toggle" class="segmented-control">
      <button class="seg-btn" data-mode="search">Search</button>
      <button class="seg-btn active" data-mode="build">Build</button>
    </div>
    <a href="draft.html" id="draft-link">Fantasy Draft</a>
    <div id="header-right">
      <button id="refresh-btn">↻</button>
      <!-- <button id="theme-toggle-btn">🌙</button> -->
    </div>
  </header>

  <main>
    <aside id="filter-panel">
      <div id="filter-panel-header">
        <h2>Filters</h2>
      </div>
      <div id="filters-container"></div>
      <div id="filter-actions">
        <button id="clear-filters-btn">Clear All</button>
      </div>
      <div id="advanced-section">
        <div id="advanced-header" class="filter-section-header">
          <span class="filter-section-arrow">&#9662;</span>
          <span class="filter-section-title">Advanced</span>
        </div>
        <div id="advanced-content">
          <div class="advanced-group">
            <label>Saved Filters</label>
            <select id="saved-filters-dropdown">
              <option value="">Load...</option>
            </select>
            <div class="advanced-btns">
              <button id="save-filter-btn">Save</button>
              <button id="export-filters-btn">Export</button>
              <button id="import-filters-btn">Import</button>
              <input type="file" id="import-file" accept=".json" hidden>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <div id="center-panel">
      <div id="card-list-header">
        <span id="card-count"></span>
        <div id="click-through-bar" class="hidden">
          <button id="ct-back-btn">&larr;</button>
          <span id="ct-label"></span>
        </div>
        <div id="sort-controls">
          <button id="sort-field-btn" title="Change sort">#</button>
          <button id="sort-dir-btn" title="Toggle sort direction">↑</button>
        </div>
      </div>
      <section id="card-list">
        <p class="placeholder">Loading cards...</p>
      </section>
      <div id="deck-stats-panel">
        <div id="deck-stats-header">
          <h3>Deck Stats</h3>
          <button id="deck-stats-toggle">▼</button>
        </div>
        <div id="deck-stats-content">
          <div class="deck-chart" data-slot="0">
            <div class="deck-chart-header">
              <h4>Energy</h4>
              <select class="chart-selector" data-slot="0">
                <option value="energy">Energy</option>
                <option value="skill-flip">Skill Flip</option>
                <option value="skill-type">Skill Types</option>
                <option value="attack">Attack</option>
                <option value="defence">Defence</option>
                <option value="position">Position</option>
                <option value="player-stack">Player Stack</option>
                <option value="set">Set</option>
                <option value="club">Club</option>
                <option value="ability">Ability</option>
                <option value="parallels">Parallels</option>
              </select>
            </div>
            <div class="bar-chart"></div>
          </div>
          <div class="deck-chart" data-slot="1">
            <div class="deck-chart-header">
              <h4>Skill Flip</h4>
              <select class="chart-selector" data-slot="1">
                <option value="energy">Energy</option>
                <option value="skill-flip" selected>Skill Flip</option>
                <option value="skill-type">Skill Types</option>
                <option value="attack">Attack</option>
                <option value="defence">Defence</option>
                <option value="position">Position</option>
                <option value="player-stack">Player Stack</option>
                <option value="set">Set</option>
                <option value="club">Club</option>
                <option value="ability">Ability</option>
                <option value="parallels">Parallels</option>
              </select>
            </div>
            <div class="bar-chart"></div>
          </div>
          <div class="deck-chart" data-slot="2">
            <div class="deck-chart-header">
              <h4>Skill Types</h4>
              <select class="chart-selector" data-slot="2">
                <option value="energy">Energy</option>
                <option value="skill-flip">Skill Flip</option>
                <option value="skill-type" selected>Skill Types</option>
                <option value="attack">Attack</option>
                <option value="defence">Defence</option>
                <option value="position">Position</option>
                <option value="player-stack">Player Stack</option>
                <option value="set">Set</option>
                <option value="club">Club</option>
                <option value="ability">Ability</option>
                <option value="parallels">Parallels</option>
              </select>
            </div>
            <div class="bar-chart"></div>
          </div>
        </div>
      </div>
    </div>

    <aside id="deck-panel">
      <div id="deck-panel-header">
        <h2>Deck</h2>
        <span id="deck-count">0 / 20</span>
      </div>
      <div id="deck-list"></div>
      <div id="deck-actions">
        <button id="clear-deck-btn">Clear Deck</button>
      </div>
    </aside>
  </main>

  <footer id="disclaimer">
    This is an unofficial fan-made tool. Topps Total Football and all related assets are property of Topps. This site is not affiliated with or endorsed by Topps.
  </footer>

  <script src="shared.js"></script>
  <script src="app.js"></script>
</body>
</html>
