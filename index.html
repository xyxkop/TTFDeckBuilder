<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTF Deck Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>TTF Deck Builder</h1>
    <button id="refresh-btn">↻ Refresh</button>
    <button id="theme-toggle-btn">🌙</button>
    <span id="card-count"></span>
    <div id="header-filters">
      <select id="saved-filters-dropdown">
        <option value="">Saved Filters</option>
      </select>
      <button id="save-filter-btn">Save</button>
      <button id="export-filters-btn">Export</button>
      <button id="import-filters-btn">Import</button>
      <input type="file" id="import-file" accept=".json" hidden>
    </div>
  </header>

  <main>
    <aside id="filter-panel">
      <h2>Filters</h2>
      <div id="filters-container"></div>
      <div id="filter-actions">
        <button id="clear-filters-btn">Clear All</button>
      </div>
      <hr>
      <h2>Sort</h2>
      <div id="sort-controls">
        <select id="sort-field">
          <option value="Card #">Card #</option>
          <option value="Name">Name</option>
          <option value="Energy">Energy</option>
          <option value="Defence">Defence</option>
          <option value="Skill">Skill</option>
          <option value="Attack">Attack</option>
        </select>
        <button id="sort-dir-btn" title="Toggle sort direction">↑</button>
      </div>
    </aside>

    <section id="card-list">
      <p class="placeholder">Loading cards...</p>
    </section>
  </main>

  <footer id="disclaimer">
    This is an unofficial fan-made tool. Topps Total Football and all related assets are property of Topps. This site is not affiliated with or endorsed by Topps.
  </footer>

  <script src="app.js"></script>
</body>
</html>
